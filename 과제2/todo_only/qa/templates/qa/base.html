<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QnA Site</title>
    <!-- TODO: Bootstrap 5 CSS CDN을 추가하세요 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
        <a class="navbar-brand" href="/">QnA</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <!-- TODO: 로그인 상태 분기를 작성하세요 -->
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link">👤 {{ user.username }}</span>
                </li>
                <li class="nav-item">
                    <!-- TODO: 질문 작성 페이지 링크를 추가하세요 -->
                    <a class="nav-link" href="{% url 'ask_question' %}">Ask Question</a>
                </li>
                <li class="nav-item">
                    <!--
                    TODO: 로그아웃 폼을 작성하세요 (POST 방식)
                    주의: <a> 태그로 하면 405 에러 발생!
                    필수: method="post", csrf_token 포함
                    -->
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link"
                                style="display:inline; padding: 0;">Logout</button>
                    </form>
                </li>

                {% else %}
                <li class="nav-item">
                    <!-- TODO: 로그인 페이지 링크를 추가하세요 -->
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                </li>
                {% endif %}

            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- TODO: Bootstrap 5 JS CDN을 추가하세요 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
